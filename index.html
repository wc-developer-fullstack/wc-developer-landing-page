
<!DOCTYPE html>
<html lang="pt-br" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WC Developer | Full Stack Engineering</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --emerald-glow: rgba(16, 185, 129, 0.4);
      }
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: #000000;
        color: #fafafa;
        overflow-x: hidden;
      }
      .font-mono {
        font-family: 'JetBrains Mono', monospace;
      }
      
      /* Custom Scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #000; }
      ::-webkit-scrollbar-thumb { background: #18181b; border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: #10b981; }

      /* Kinetic & Hero Animations */
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-15px); }
      }
      .animate-float {
        animation: float 5s ease-in-out infinite;
      }

      @keyframes spin-slow {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      .animate-spin-slow {
        animation: spin-slow 12s linear infinite;
      }

      @keyframes pulse-ring {
        0% { transform: scale(0.95); opacity: 0.3; }
        50% { transform: scale(1.05); opacity: 0.6; }
        100% { transform: scale(0.95); opacity: 0.3; }
      }
      .animate-pulse-ring {
        animation: pulse-ring 4s ease-in-out infinite;
      }

      @keyframes kinetic-sonar {
        0% { transform: scale(1); opacity: 0.6; border-width: 1px; }
        100% { transform: scale(1.8); opacity: 0; border-width: 0.5px; }
      }
      .kinetic-ring {
        position: absolute;
        inset: 0;
        border: 1px solid #10b981;
        border-radius: inherit;
        pointer-events: none;
        animation: kinetic-sonar 3s cubic-bezier(0.2, 0.8, 0.2, 1) infinite;
      }
      .kinetic-ring-delayed {
        animation-delay: 1.5s;
      }

      /* Entry Animations (Animate.css Fallback) */
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .animate__fadeIn {
        animation: fadeIn 1s ease-out forwards;
      }

      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate__fadeInUp {
        animation: fadeInUp 1s ease-out forwards;
      }

      @keyframes internal-glow {
        0%, 100% { box-shadow: 0 0 15px 0px rgba(16, 185, 129, 0.1); }
        50% { box-shadow: 0 0 25px 2px rgba(16, 185, 129, 0.25); }
      }
      .whatsapp-btn-active {
        animation: internal-glow 4s ease-in-out infinite;
      }

      /* Reveal Animation System */
      .reveal {
        opacity: 0;
        transform: translateY(30px);
        transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .reveal.active {
        opacity: 1;
        transform: translateY(0);
      }

      .glass {
        background: rgba(9, 9, 11, 0.7);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      
      .gradient-text {
        background: linear-gradient(135deg, #fff 0%, #a1a1aa 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
        "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
        "react/": "https://esm.sh/react@^19.2.3/",
        "react": "https://esm.sh/react@^19.2.3"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
